<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Follow Your Mouse — Particle System</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #0a0a0f; overflow: hidden; cursor: crosshair; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
const resize = () => { W = canvas.width = innerWidth; H = canvas.height = innerHeight; };
resize();
addEventListener('resize', resize);

const mouse = { x: W / 2, y: H / 2 };
addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
addEventListener('touchmove', e => { e.preventDefault(); mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }, { passive: false });

const particles = [];
const MAX = 200;
const TRAIL = canvas.cloneNode();
const tctx = TRAIL.getContext('2d');
TRAIL.width = W; TRAIL.height = H;
addEventListener('resize', () => { TRAIL.width = W; TRAIL.height = H; });

function spawn() {
  if (particles.length >= MAX) return;
  const angle = Math.random() * Math.PI * 2;
  const speed = 1 + Math.random() * 2;
  particles.push({
    x: mouse.x, y: mouse.y,
    vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
    r: 2 + Math.random() * 3,
    hue: (performance.now() * 0.05 + Math.random() * 60) % 360,
    life: 1,
    decay: 0.003 + Math.random() * 0.004
  });
}

function update() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    // attract toward mouse
    const dx = mouse.x - p.x, dy = mouse.y - p.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const force = Math.min(80 / dist, 2);
    p.vx += (dx / dist) * force * 0.3;
    p.vy += (dy / dist) * force * 0.3;
    // damping
    p.vx *= 0.97; p.vy *= 0.97;
    p.x += p.vx; p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    // simple collision — push apart from nearby particles
    for (let j = i - 1; j >= 0; j--) {
      const q = particles[j];
      const cx = p.x - q.x, cy = p.y - q.y;
      const d2 = cx * cx + cy * cy;
      const minD = p.r + q.r;
      if (d2 < minD * minD && d2 > 0.1) {
        const d = Math.sqrt(d2);
        const nx = cx / d, ny = cy / d;
        const overlap = (minD - d) * 0.5;
        p.x += nx * overlap; p.y += ny * overlap;
        q.x -= nx * overlap; q.y -= ny * overlap;
        // exchange velocity component along collision normal
        const dvx = p.vx - q.vx, dvy = p.vy - q.vy;
        const dot = dvx * nx + dvy * ny;
        if (dot > 0) {
          p.vx -= nx * dot * 0.5; p.vy -= ny * dot * 0.5;
          q.vx += nx * dot * 0.5; q.vy += ny * dot * 0.5;
        }
      }
    }
  }
}

function draw() {
  // draw trails onto offscreen canvas
  tctx.fillStyle = 'rgba(10,10,15,0.04)';
  tctx.fillRect(0, 0, W, H);
  for (const p of particles) {
    tctx.beginPath();
    tctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    tctx.fillStyle = `hsla(${p.hue},100%,65%,${p.life * 0.6})`;
    tctx.fill();
  }
  // composite
  ctx.clearRect(0, 0, W, H);
  ctx.drawImage(TRAIL, 0, 0);
  // draw bright particles on top
  for (const p of particles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue},100%,70%,${p.life})`;
    ctx.shadowColor = `hsla(${p.hue},100%,60%,0.8)`;
    ctx.shadowBlur = 12;
    ctx.fill();
  }
  ctx.shadowBlur = 0;
}

function loop() {
  for (let i = 0; i < 3; i++) spawn();
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
